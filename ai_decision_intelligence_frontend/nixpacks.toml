# nixpacks.toml for Flutter Web deployment on Railway

[phases.build]
commands = [
  "git clone https://github.com/flutter/flutter.git --depth 1 -b stable $HOME/flutter",
  "export PATH=\"$PATH:$HOME/flutter/bin\"",
  "flutter config --enable-web",
  "flutter build web --release",
  "npm install"
]

[start]
cmd = "npm start"

# Define the environment variables (optional, but good practice)
[variables]
# You might need to specify a Node.js version if auto-detection fails
# NODE_VERSION = "18" # Example: use Node.js 18